  /v1/tools/{toolID}:
    get:
      summary: Returns details for a specific tool.
      tags:
        - Tools
      parameters:
        - name: toolID
          in: path
          required: true
          description: The ID of the tool
          schema:
            type : integer
            format: int64
            minimum: 1
            example: 89522470
      responses: 
        '200':
          description: OK


openapi: 3.0.0
info:
  title: HDR UK API 
  description: API for Tools and artefacts repository.
  version: 0.0.1

servers:
  - url: http://localhost:3001/api

  - url: https://api.{environment}.healthdatagateway.org:{port}/api
    variables:
      environment:
        default: latest
        description: The Environment name.
      port:
        enum:
          - '443'
        default: '443'

paths:
  /v1/datasets/{datasetID}:
    get:
      summary: Returns details for a Dataset.
      tags:
        - Datasets
      parameters:
        - in: path
          name: datasetID
          required: true
          description: The ID of the datset
          schema:
            type : integer
            format: int64
            minimum: 1
            example: 89522470
      responses: 
        '200':
          description: OK    

  /v1/datasets/detail/{datasetID}:
    get:
      summary: Returns additional details for a dataset from the Metadata catalogue.
      tags:
        - Datasets
      parameters:
        - in: path
          name: datasetID
          required: true
          description: The ID of the datset
          schema:
           type : string
            example: d3a3935f-b28e-4e74-9b15-9432d611f26c
      responses: 
        '200':
          description: OK 

  /v1/datasets/search?search={searchTerm}:
    get:
      summary: Returns dataset search results by searchTerm
      tags:
        - Datasets
      parameters:
        - name: searchTerm
          in: path
          required: true
          description: A search term.
          schema:
            type : string
            example: epilepsy
      responses: 
        '200':
          description: OK

  /v1/datasets/filters?search={searchTerm}:
    get:
      summary: Returns filters options for datasets
      tags:
        - Datasets
      parameters:
        - name: search
          in: query
          required: false
          description: Type of datasearch.
          schema:
            type : string
            example: epilepsy
      responses: 
        '200':
          description: OK
                
  /v1/datasets/access/request:
    post:
      summary: Access request for dataset
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:      # Request body contents
              type: object
              properties:
                title:
                  type: string
                  example: 'Epilepsy 12 - National organisation audit'
                userId:
                  type: integer
                  example: 12345654323456
                dataSetId:
                  type: string,
                  example: '2345654323456'
                researchAim:
                  type: string
                  example: 'The aim of your research, description needed.'
                linkedDataSets:
                  type: boolean
                  example: true
                namesOfDataSets:
                  type: string
                  example: 'The name of the datasets that are linked.'
                dataRequirements:
                  type: boolean
                  example: true
                dataSetParts:
                  type: string
                  example: 'The dataset parts that you would like.'
                startDate:
                  type: string
                  example: '19/12/2022'     
                icoRegistration:
                  type: string 
                  example: '66252AAA'
                researchBenefits:
                  type: string,
                  example: 'Would benefit would this research provide.'
                ethicalProcessingEvidence:
                  type: string
                  example: 'Ethical processing evidence'
                contactNumber:
                  type: string
                  example: '07656788909'
      tags:
        - Datasets
      responses: 
        '200':
          description: OK

  /v1/data-access-request/{datasetID}:
    get:
      summary: Returns access request template.
      security:
        - cookieAuth: []
      tags:
        - Data Access Request
      parameters:
        - in: path
          name: datasetID
          required: true
          description: The ID of the datset
          schema:
            type : string
            example: 6efbc62f-6ebb-4f18-959b-1ec6fd0cc6fb
      responses: 
        '200':
          description: OK 

  /v1/data-access-request/{id}:
    patch:
      summary: Update a users question answers for access request.
      security:
        - cookieAuth: []
      tags:
        - Data Access Request
      parameters:
        - in: path
          name: datasetID
          required: true
          description: The ID of the datset
          schema:
            type : string
            example: 5ee249426136805fbf094eef
        - in: body 
          name: questionAnswers
          description: Answers object
          schema: 
            type: object
            properties:
              questionAnswers:
                type: string
                example: '{firstName: Roger}'
      responses: 
        '200':
          description: OK 
        
  /v1/person/{personID}:
    get:
      summary: Returns details for a person.
      tags:
        - Person
      parameters:
        - in: path
          name: personID
          required: true
          description: The ID of the person
          schema:
            type : string
            example: b2475d19-75fe-422b-9d0c-c53cdfff8230
      responses:
        '200':
          description: OK 

  /v1/accounts/admin/collections?id={userId}:
    get:
      summary: Returns collections that the user is a collaborator on.
      tags:
        - Collections
      parameters:
        - in: path
          name: userId
          required: true
          description: The ID of the user
          schema:
            type : number
            example: 46035149615760184
      responses:
        '200':
          description: OK 

  /v1/accounts/admin/collections:
    get:
      summary: This will return a JSON document to show all collections.
      tags:
        - Collections
      responses: 
        '200':
          description: OK
          
  /v1/search:
    get:
      tags:
        - Search
      summary: Search for HDRUK /search?search
      produces:
        - application/json
      parameters:
        - in: query
          name: params
          schema:
            type: object
            properties:
              search:
                type: string
                example: Epilepsy
              type:
                type: string
                example: all
              category:
                type: string
                example: API
              programmingLanguage:
                type: string
                example: Javascript
              features:
                type: string
                example: Arbitrage
              topics:
                type: string
                example: Epilepsy
              startIndex:
                type: string
                example: 0
              maxResults:
                type: string
                example: 10
          style: form
          explode: true
      responses: 
        '200':
          description: OK
  
  /v1/stats:
    get:
      summary: This will return a JSON document to show high level stats.
      tags:
        - Stats
      responses: 
        '200':
          description: OK

  /v1/stats/recent:
    get:
      summary: Return the details on the recent searches.
      tags:
        - Stats
      responses: 
        '200':
          description: OK

  /v1/stats/unmet:
    get:
      summary: Return the details on the unmet searches.
      tags:
        - Stats
      responses: 
        '200':
          description: OK

  /v1/stats/popular:
    get:
      summary: Return the details on the popular objects.
      tags:
        - Stats
      responses: 
        '200':
          description: OK

  /v1/stats/updates:
    get:
      summary: Return the details on the updated objects.
      tags:
        - Stats
      responses: 
        '200':
          description: OK

  /v1/tools/add:
    post:
      summary: Add a tool.
      security:
        - cookieAuth: []
      tags:
        - Tools
      requestBody:
        content:
          application/json:
            schema:      # Request body contents
              type: object
              required:
                - name
              properties:
                type:
                  type: string
                name:
                  type: string
                link:
                  type: string
                description:
                  type: string
                categories:
                  type: object
                  properties:
                    category:
                      type: string
                    programmingLanguage:
                      type: array
                      items:
                        type: string
                    programmingLanguageVersion:
                      type: string
                licence:
                  type: string
                authors:
                  type: array
                  items:
                    type: number
                tags:
                  type: object
                  properties:
                    features:
                      type: array
                      items:
                        type: string
                    topics:
                      type: array
                      items:
                        type: string      
              example:   # Sample object
                type: 'tool'
                name: 'Epilepsy data research'
                link: 'http://epilepsy.org'
                description: 'Epilespy data research description'
                categories: { category: 'API', programmingLanguage: ['Javascript'], programmingLanguageVersion: '0.0.0'}
                licence: 'MIT licence'
                authors: [4495285946631793]
                tags: {features: ['Arbitrage'], topics: ['Epilepsy']}
      responses: 
        '200':
          description: OK
        
  /v1/tools/edit:
    put:
      summary: Edit a tool.
      security:
        - cookieAuth: []
      tags:
        - Tools
      requestBody:
        content:
          application/json:
            schema:      # Request body contents
              type: object
              required:
                - name
              properties:
                id:
                  type: number
                type:
                  type: string
                name:
                  type: string
                link:
                  type: string
                description:
                  type: string
                categories:
                  type: object
                  properties:
                    category:
                      type: string
                    programmingLanguage:
                      type: array
                      items:
                        type: string
                    programmingLanguageVersion:
                      type: string
                licence:
                  type: string
                authors:
                  type: array
                  items:
                    type: number
                tags:
                  type: object
                  properties:
                    features:
                      type: array
                      items:
                        type: string
                    topics:
                      type: array
                      items:
                        type: string    
                toolids:
                  type: array
                  items:
                    type: string
              example:   # Sample object
                id: 26542005388306332
                type: 'tool'
                name: 'Research Data TEST EPILEPSY'
                link: 'http://localhost:8080/epilepsy'
                description: 'Epilespy data research description'
                categories: { category: 'API', programmingLanguage: ['Javascript'], programmingLanguageVersion: '1.0.0'}
                licence: 'MIT licence'
                authors: [4495285946631793]
                tags: {features: ['Arbitrage'], topics: ['Epilepsy']}
                toolids: []
      responses: 
        '200':
          description: OK

  /v1/tools/delete:
    delete:
      summary: Delete a tool.
      security:
        - cookieAuth: []
      tags:
        - Tools
      requestBody:
        content:
          application/json:
            schema:      # Request body contents
              type: object
              required:
                - id
              properties:
                id:
                  type: number
                id: 26542005388306332
              example:   # Sample object
                id: 26542005388306332
      responses: 
        '200':
          description: OK

